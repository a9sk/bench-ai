version: '3.8'

services:
  backend:
    build: ./backend
    container_name: benchai-backend
    restart: always
    ports:
      - "8000:8000"
    networks:
      - benchai-net
    depends_on:
      - mysql
      - lmstudio
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=benchai
      - DB_USER=root
      - DB_PASSWORD=root
      - OLLAMA_URL=http://lmstudio:11434

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: benchai-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - benchai-net

  mysql:
    image: mysql:8.0
    container_name: benchai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: benchai
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    volumes:
      - benchai-mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - benchai-net

  lmstudio:
    image: ollama/ollama
    container_name: benchai-llm
    restart: always
    ports:
      - "11434:11434"
    networks:
      - benchai-net
    volumes:
      - ./ollama_data:/root/.ollama

networks:
  benchai-net:
    driver: bridge

volumes:
  benchai-mysql-data:
